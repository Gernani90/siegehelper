services:
  - type: web
    name: siege-helper-api
    runtime: python
    plan: free
    rootDir: app/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: siege-helper-db
          property: connectionString
      - key: IS_LAMBDA
        value: false
      - key: ENVIRONMENT
        value: prod

  - type: web
    name: siege-helper-web
    runtime: node
    plan: free
    rootDir: app/frontend
    buildCommand: echo "Using checked-in frontend dist"
    startCommand: node serve-dist.mjs
    envVars:
      - key: PYTHON_BACKEND_URL
        value: https://siege-helper-api.onrender.com
      - key: SKIP_INSTALL_DEPS
        value: true

databases:
  - name: siege-helper-db
    plan: free
