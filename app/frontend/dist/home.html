<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Helper</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #020617;
      }

      button,
      input,
      select {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(51, 65, 85, 0.7);
        background: rgba(15, 23, 42, 0.96);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        display: flex;
        height: 64px;
        max-width: 1280px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 20px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 7px;
        background: rgba(99, 102, 241, 0.22);
        color: #a5b4fc;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav a,
      .button {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0 14px;
        background: transparent;
        color: #cbd5e1;
        cursor: pointer;
      }

      .nav a:hover,
      .button:hover {
        background: rgba(30, 41, 59, 0.8);
        color: #fff;
      }

      .button.primary {
        background: #4f46e5;
        color: #fff;
      }

      .button.primary:hover {
        background: #4338ca;
      }

      .button.outline {
        border-color: #475569;
      }

      .button.import {
        border-color: rgba(5, 150, 105, 0.8);
        color: #6ee7b7;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px 16px 36px;
      }

      .page-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .muted {
        color: #94a3b8;
      }

      .small {
        font-size: 14px;
      }

      .toolbar {
        display: grid;
        gap: 14px;
        margin-bottom: 20px;
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap span {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.58);
        color: #e2e8f0;
        outline: none;
      }

      input {
        padding: 0 12px 0 38px;
      }

      select {
        padding: 0 10px;
      }

      input:focus,
      select:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(5, minmax(130px, 1fr));
        gap: 10px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 22px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .card {
        display: grid;
        gap: 12px;
        min-height: 256px;
        border: 1px solid rgba(51, 65, 85, 0.7);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.55);
        padding: 16px;
        transition: border-color 0.16s ease, background 0.16s ease;
      }

      .card:hover {
        border-color: rgba(99, 102, 241, 0.7);
        background: rgba(30, 41, 59, 0.82);
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .card-title {
        display: -webkit-box;
        overflow: hidden;
        margin: 0;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        font-size: 16px;
        line-height: 1.3;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0 8px;
        color: #cbd5e1;
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.tower {
        border-color: rgba(99, 102, 241, 0.55);
        color: #c7d2fe;
      }

      .badge.season {
        border-color: rgba(6, 182, 212, 0.55);
        color: #67e8f9;
      }

      .badge.medium {
        border-color: rgba(234, 179, 8, 0.35);
        background: rgba(234, 179, 8, 0.1);
        color: #facc15;
      }

      .monsters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .monster {
        min-width: 0;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.64);
        padding: 8px;
        text-align: center;
      }

      .portrait {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        overflow: hidden;
        margin: 0 auto 8px;
        border-radius: 8px;
        background: #334155;
        color: #94a3b8;
        font-weight: 700;
      }

      .portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .monster-name {
        overflow: hidden;
        color: #f8fafc;
        font-size: 12px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .pager {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid #1e293b;
      }

      .empty,
      .loading {
        display: grid;
        min-height: 220px;
        place-items: center;
        color: #94a3b8;
        text-align: center;
      }

      @media (max-width: 960px) {
        .filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .nav {
          display: none;
        }

        .page-head,
        .pager {
          align-items: stretch;
          flex-direction: column;
        }

        .filters,
        .grid {
          grid-template-columns: 1fr;
        }

        .button {
          width: 100%;
        }
      }

      :root {
        --sw-bg: #090d16;
        --sw-panel: rgba(24, 31, 45, 0.78);
        --sw-panel-strong: rgba(33, 42, 60, 0.92);
        --sw-border: rgba(187, 147, 72, 0.32);
        --sw-border-soft: rgba(102, 125, 154, 0.34);
        --sw-gold: #d8ad5f;
        --sw-gold-bright: #f4d38a;
        --sw-blue: #4ea7d8;
        --sw-ink: #070a12;
      }

      body {
        background:
          linear-gradient(135deg, rgba(8, 11, 18, 0.98), rgba(13, 21, 33, 0.98) 46%, rgba(31, 26, 20, 0.98)),
          repeating-linear-gradient(45deg, rgba(244, 211, 138, 0.035) 0 1px, transparent 1px 18px);
      }

      .topbar {
        border-bottom-color: var(--sw-border);
        background: rgba(9, 13, 22, 0.94);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.26);
      }

      .brand { color: var(--sw-gold-bright); }

      .brand-mark {
        border: 1px solid rgba(244, 211, 138, 0.38);
        background: linear-gradient(145deg, rgba(216, 173, 95, 0.28), rgba(78, 167, 216, 0.18));
        color: var(--sw-gold-bright);
      }

      .nav a:hover,
      .button:hover {
        background: rgba(216, 173, 95, 0.12);
        color: #fff7df;
      }

      .button.primary {
        border-color: rgba(244, 211, 138, 0.42);
        background: linear-gradient(180deg, #b98535, #7e5523);
        box-shadow: 0 12px 28px rgba(126, 85, 35, 0.28);
      }

      .button.primary:hover { background: linear-gradient(180deg, #d09a45, #8e6129); }
      .button.outline { border-color: var(--sw-border); color: #f3d99e; }
      .button.import { border-color: rgba(78, 167, 216, 0.65); color: #9ed8f1; }
      h1, .card-title { color: #fff3cf; }
      .muted { color: #a8b6c8; }

      input,
      select {
        border-color: rgba(102, 125, 154, 0.44);
        background: rgba(7, 10, 18, 0.58);
      }

      input:focus,
      select:focus {
        border-color: var(--sw-gold);
        box-shadow: 0 0 0 3px rgba(216, 173, 95, 0.18);
      }

      .card {
        border-color: var(--sw-border-soft);
        background: linear-gradient(180deg, var(--sw-panel-strong), var(--sw-panel));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 45px rgba(0, 0, 0, 0.22);
      }

      .card:hover {
        border-color: rgba(244, 211, 138, 0.66);
        background: linear-gradient(180deg, rgba(39, 49, 68, 0.96), rgba(27, 35, 51, 0.9));
      }

      .badge {
        border-color: rgba(102, 125, 154, 0.44);
        background: rgba(7, 10, 18, 0.28);
      }

      .badge.tower { border-color: rgba(216, 173, 95, 0.56); color: var(--sw-gold-bright); }
      .badge.season { border-color: rgba(78, 167, 216, 0.55); color: #9ed8f1; }

      .portrait {
        background: linear-gradient(145deg, #202b3f, #111827);
        box-shadow: inset 0 0 0 1px rgba(244, 211, 138, 0.12), 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      .pager {
        border-top-color: rgba(187, 147, 72, 0.18);
      }

      main {
        padding-top: 28px;
      }

      .page-head {
        position: relative;
        overflow: hidden;
        align-items: center;
        border: 1px solid rgba(187, 147, 72, 0.28);
        border-radius: 8px;
        background:
          radial-gradient(circle at 18% 0%, rgba(216, 173, 95, 0.18), transparent 34%),
          radial-gradient(circle at 86% 12%, rgba(78, 167, 216, 0.16), transparent 32%),
          linear-gradient(135deg, rgba(33, 42, 60, 0.86), rgba(12, 17, 29, 0.9));
        padding: 22px;
        box-shadow: 0 22px 56px rgba(0, 0, 0, 0.28);
      }

      .page-head::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(244, 211, 138, 0.16), transparent 38%, rgba(78, 167, 216, 0.12)),
          repeating-linear-gradient(90deg, transparent 0 31px, rgba(255, 255, 255, 0.025) 31px 32px);
        opacity: 0.55;
      }

      .page-head > * {
        position: relative;
        z-index: 1;
      }

      h1 {
        font-size: 34px;
        letter-spacing: 0;
      }

      .toolbar {
        border: 1px solid rgba(102, 125, 154, 0.24);
        border-radius: 8px;
        background: rgba(7, 10, 18, 0.28);
        padding: 14px;
      }

      .grid {
        gap: 18px;
      }

      .card {
        position: relative;
        overflow: hidden;
        min-height: 286px;
        padding: 0;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-top: 1px solid rgba(244, 211, 138, 0.22);
        background: radial-gradient(circle at 50% 0%, rgba(216, 173, 95, 0.1), transparent 38%);
        pointer-events: none;
      }

      .card-head {
        position: relative;
        z-index: 1;
        min-height: 78px;
        padding: 15px 15px 4px;
      }

      .card-title {
        font-size: 17px;
      }

      .monsters {
        position: relative;
        z-index: 1;
        padding: 8px 14px 12px;
      }

      .monster {
        border-color: rgba(187, 147, 72, 0.24);
        background:
          linear-gradient(180deg, rgba(16, 22, 35, 0.72), rgba(7, 10, 18, 0.52));
        padding: 9px 7px 10px;
      }

      .portrait {
        width: 72px;
        height: 72px;
        border: 1px solid rgba(244, 211, 138, 0.16);
        border-radius: 999px;
      }

      .monster-name {
        color: #e9edf5;
        font-size: 12px;
      }

      .card-tags {
        position: relative;
        z-index: 1;
        margin-top: auto;
        border-top: 1px solid rgba(102, 125, 154, 0.18);
        padding: 12px 15px 15px;
      }

      .actions .button.import,
      .button.import[hidden] {
        display: none !important;
      }
    </style>
    <link rel="stylesheet" href="/theme.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/dashboard">
          <span class="brand-mark">S</span>
          <span>Siege Helper</span>
        </a>
        <nav class="nav">
          <a href="/dashboard">Home</a>
          <a href="/defenses/new">Nova Defesa</a>
          <a href="/attacks/new">Novo Ataque</a>
          <a href="/?logout=1">Sair</a>
          <button class="theme-toggle" id="themeToggle" type="button">Light</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-head">
        <div>
          <h1>Home</h1>
          <div class="muted small">Defesas cadastradas para consulta rápida.</div>
        </div>
        <div class="muted small" id="rangeText">Carregando...</div>
      </section>

      <section class="toolbar">
        <div class="search-wrap">
          <span>⌕</span>
          <input id="searchInput" placeholder="Buscar defesa por monstros... (ex: Clara Savannah Triana)" />
        </div>
        <div class="filters">
          <select id="towerFilter">
            <option value="">Todas torres</option>
            <option value="4star">4★</option>
            <option value="5star">5★</option>
          </select>
          <select id="difficultyFilter">
            <option value="">Todas dificuldades</option>
            <option value="easy">Fácil</option>
            <option value="medium">Médio</option>
            <option value="hard">Difícil</option>
          </select>
          <select id="typeFilter">
            <option value="">Todos tipos</option>
            <option value="bruiser">Bruiser</option>
            <option value="cleave">Cleave</option>
            <option value="sustain">Sustain</option>
            <option value="control">Controle</option>
            <option value="speed_contest">Speed Contest</option>
          </select>
          <select id="elementFilter">
            <option value="">Todos elementos</option>
            <option value="fire">Fogo</option>
            <option value="water">Água</option>
            <option value="wind">Vento</option>
            <option value="light">Luz</option>
            <option value="dark">Trevas</option>
          </select>
          <select id="seasonFilter">
            <option value="">Todas seasons</option>
          </select>
        </div>
      </section>

      <section class="actions">
        <a class="button primary" href="/defenses/new">Nova Defesa</a>
        <a class="button outline" href="/attacks/new">Novo Ataque</a>
        <a class="button import" href="/import" hidden>Importar SWGT</a>
      </section>

      <section id="content" class="loading">Carregando defesas...</section>

      <section class="pager" id="pager" hidden>
        <div class="muted small" id="pageText"></div>
        <div style="display: flex; gap: 8px;">
          <button class="button outline" id="prevButton">Anterior</button>
          <button class="button outline" id="nextButton">Próxima</button>
        </div>
      </section>
    </main>

    <script>
      function setupThemeToggle() {
        const key = "siege-helper-theme";
        const button = document.getElementById("themeToggle");
        const applyTheme = (theme) => {
          document.documentElement.dataset.theme = theme;
          if (button) button.textContent = theme === "light" ? "Dark" : "Light";
        };
        applyTheme(localStorage.getItem(key) || "dark");
        if (button) {
          button.addEventListener("click", () => {
            const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
            localStorage.setItem(key, nextTheme);
            applyTheme(nextTheme);
          });
        }
      }
      setupThemeToggle();

      const API_BASE = "";
      const IMG_BASE = "https://swarfarm.com/static/herders/images/monsters/";
      const PAGE_SIZE = 24;
      const state = { page: 1, total: 0, loading: false };
      const portraitCache = new Map();
      const seasonFilter = document.getElementById("seasonFilter");
      const content = document.getElementById("content");
      const rangeText = document.getElementById("rangeText");
      const pageText = document.getElementById("pageText");
      const pager = document.getElementById("pager");
      const prevButton = document.getElementById("prevButton");
      const nextButton = document.getElementById("nextButton");

      for (let season = 25; season >= 1; season -= 1) {
        const option = document.createElement("option");
        option.value = `Season ${season}`;
        option.textContent = `Season ${season}`;
        seasonFilter.appendChild(option);
      }

      function params() {
        const query = new URLSearchParams({
          limit: String(PAGE_SIZE),
          skip: String((state.page - 1) * PAGE_SIZE),
        });
        const filters = {
          q: document.getElementById("searchInput").value.trim(),
          tower: document.getElementById("towerFilter").value,
          difficulty: document.getElementById("difficultyFilter").value,
          defense_type: document.getElementById("typeFilter").value,
          element: document.getElementById("elementFilter").value,
          season: document.getElementById("seasonFilter").value,
        };
        Object.entries(filters).forEach(([key, value]) => {
          if (value) query.set(key, value);
        });
        return query;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function label(map, value) {
        return map[value] || value || "";
      }

      const towerLabels = { "4star": "4★", "5star": "5★" };
      const difficultyLabels = { easy: "Fácil", medium: "Médio", hard: "Difícil" };
      const typeLabels = {
        bruiser: "Bruiser",
        cleave: "Cleave",
        sustain: "Sustain",
        control: "Controle",
        speed_contest: "Speed Contest",
      };

      function monsterMarkup(name) {
        const key = name.toLowerCase();
        const portrait = portraitCache.get(key);
        const image = portrait?.imageUrl
          ? `<img src="${escapeHtml(portrait.imageUrl)}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.remove()" />`
          : escapeHtml(name.slice(0, 1));
        return `
          <div class="monster" data-monster="${escapeHtml(name)}">
            <div class="portrait">${image}</div>
            <div class="monster-name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
          </div>
        `;
      }

      function defenseMarkup(item) {
        const defense = item.defense;
        return `
          <a class="card" href="/defenses/${defense.id}">
            <div class="card-head">
              <h2 class="card-title">${escapeHtml(defense.name)}</h2>
              <span class="badge tower">${escapeHtml(label(towerLabels, defense.tower))}</span>
            </div>
            <div class="monsters">
              ${monsterMarkup(defense.monster1)}
              ${monsterMarkup(defense.monster2)}
              ${monsterMarkup(defense.monster3)}
            </div>
            <div class="card-tags">
              <span class="badge">${escapeHtml(label(typeLabels, defense.defense_type))}</span>
              <span class="badge ${escapeHtml(defense.difficulty)}">${escapeHtml(label(difficultyLabels, defense.difficulty))}</span>
              ${defense.season ? `<span class="badge season">${escapeHtml(defense.season)}</span>` : ""}
              <span class="muted small">${item.attack_count} ataque${item.attack_count === 1 ? "" : "s"}</span>
            </div>
          </a>
        `;
      }

      function updatePager() {
        const totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
        const start = state.total === 0 ? 0 : (state.page - 1) * PAGE_SIZE + 1;
        const end = Math.min(state.page * PAGE_SIZE, state.total);
        rangeText.textContent = state.loading ? "Carregando..." : `${start}-${end} de ${state.total} defesas`;
        pageText.textContent = `Página ${state.page} de ${totalPages}`;
        prevButton.disabled = state.page <= 1 || state.loading;
        nextButton.disabled = state.page >= totalPages || state.loading;
        pager.hidden = state.total === 0;
      }

      async function lookupPortrait(name) {
        const key = name.toLowerCase();
        if (portraitCache.has(key)) return;
        portraitCache.set(key, null);
        try {
          const query = new URLSearchParams({ name, page_size: "10" });
          const response = await fetch(`${API_BASE}/api/v1/monsters/search?${query}`);
          if (!response.ok) return;
          const data = await response.json();
          const results = data.results || [];
          const match = results.find((item) => item.name?.toLowerCase() === key) || results[0];
          if (match?.image_filename) {
            portraitCache.set(key, { imageUrl: `${IMG_BASE}${match.image_filename}` });
          }
        } catch {}
      }

      async function loadPortraits(items) {
        const names = [...new Set(items.flatMap((item) => {
          const defense = item.defense;
          return [defense.monster1, defense.monster2, defense.monster3];
        }))];
        let index = 0;
        async function worker() {
          while (index < names.length) {
            const name = names[index];
            index += 1;
            await lookupPortrait(name);
          }
        }
        await Promise.all(Array.from({ length: 6 }, worker));
      }

      let searchTimer;
      async function loadDefenses() {
        state.loading = true;
        updatePager();
        content.className = "loading";
        content.textContent = "Carregando defesas...";
        try {
          const response = await fetch(`${API_BASE}/api/v1/search/defenses?${params()}`);
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "Erro ao buscar defesas");
          state.total = data.total || 0;
          const items = data.results || [];
          if (!items.length) {
            content.className = "empty";
            content.innerHTML = "<div>Nenhuma defesa encontrada.<br><span class='small muted'>Tente buscar por outros monstros ou cadastre uma nova defesa.</span></div>";
            return;
          }
          await loadPortraits(items);
          content.className = "grid";
          content.innerHTML = items.map(defenseMarkup).join("");
        } catch (error) {
          content.className = "empty";
          content.textContent = error.message || "Erro ao carregar defesas.";
        } finally {
          state.loading = false;
          updatePager();
        }
      }

      function resetAndLoad() {
        state.page = 1;
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadDefenses, 250);
      }

      ["searchInput", "towerFilter", "difficultyFilter", "typeFilter", "elementFilter", "seasonFilter"].forEach((id) => {
        const eventName = id === "searchInput" ? "input" : "change";
        document.getElementById(id).addEventListener(eventName, resetAndLoad);
      });

      prevButton.addEventListener("click", () => {
        state.page = Math.max(1, state.page - 1);
        loadDefenses();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      nextButton.addEventListener("click", () => {
        state.page += 1;
        loadDefenses();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      loadDefenses();
    </script>
  </body>
</html>
