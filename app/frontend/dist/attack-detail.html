<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Helper</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #020617; }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(51, 65, 85, 0.7);
        background: rgba(15, 23, 42, 0.96);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        display: flex;
        height: 64px;
        max-width: 1024px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 20px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 7px;
        background: rgba(99, 102, 241, 0.22);
        color: #a5b4fc;
      }

      .nav { display: flex; align-items: center; gap: 8px; }

      .nav a,
      .button {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0 14px;
        background: transparent;
        color: #cbd5e1;
        cursor: pointer;
      }

      .nav a:hover,
      .button:hover { background: rgba(30, 41, 59, 0.8); color: #fff; }
      .button.primary { background: #4f46e5; color: #fff; }
      .button.outline { border-color: #475569; }
      .button.danger {
        border-color: rgba(248, 113, 113, 0.55);
        background: rgba(127, 29, 29, 0.24);
        color: #fecaca;
      }

      main {
        max-width: 1024px;
        margin: 0 auto;
        padding: 24px 16px 36px;
      }

      .card {
        border: 1px solid rgba(51, 65, 85, 0.7);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.55);
        padding: 20px;
      }

      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 { margin: 0; font-size: 28px; line-height: 1.15; }
      h2 { margin: 26px 0 12px; font-size: 20px; }
      h3 { margin: 0 0 8px; font-size: 15px; }

      .muted { color: #94a3b8; }
      .small { font-size: 14px; }

      .badges,
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0 9px;
        color: #cbd5e1;
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.good {
        border-color: rgba(34, 197, 94, 0.4);
        background: rgba(34, 197, 94, 0.08);
        color: #86efac;
      }

      .badge.medium {
        border-color: rgba(234, 179, 8, 0.35);
        background: rgba(234, 179, 8, 0.1);
        color: #facc15;
      }

      .monsters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .monster {
        min-width: 0;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.64);
        padding: 14px;
        text-align: center;
      }

      .portrait {
        display: grid;
        width: 96px;
        height: 96px;
        place-items: center;
        overflow: hidden;
        margin: 0 auto 10px;
        border-radius: 10px;
        background: #334155;
        color: #94a3b8;
        font-size: 28px;
        font-weight: 700;
      }

      .portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .monster-name {
        overflow-wrap: anywhere;
        color: #f8fafc;
        font-weight: 700;
      }

      .monster-build {
        margin-top: 9px;
        color: #94a3b8;
        font-size: 13px;
        line-height: 1.4;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .info {
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.5);
        padding: 14px;
      }

      .info.focus { border-color: rgba(99, 102, 241, 0.35); }
      .info.tips { border-color: rgba(34, 197, 94, 0.28); }
      .info.risks { border-color: rgba(248, 113, 113, 0.28); }
      .info.requirements { border-color: rgba(234, 179, 8, 0.28); }

      .preline { white-space: pre-line; }
      .loading, .empty { display: grid; min-height: 220px; place-items: center; color: #94a3b8; text-align: center; }

      @media (max-width: 680px) {
        .nav { display: none; }
        .head { flex-direction: column; }
        .monsters, .info-grid { grid-template-columns: 1fr; }
        .button { width: 100%; }
      }

      :root {
        --sw-panel: rgba(24, 31, 45, 0.78);
        --sw-panel-strong: rgba(33, 42, 60, 0.92);
        --sw-border: rgba(187, 147, 72, 0.32);
        --sw-border-soft: rgba(102, 125, 154, 0.34);
        --sw-gold: #d8ad5f;
        --sw-gold-bright: #f4d38a;
        --sw-blue: #4ea7d8;
        --sw-crimson: #c85f5f;
      }

      body {
        background:
          linear-gradient(135deg, rgba(8, 11, 18, 0.98), rgba(13, 21, 33, 0.98) 46%, rgba(31, 26, 20, 0.98)),
          repeating-linear-gradient(45deg, rgba(244, 211, 138, 0.035) 0 1px, transparent 1px 18px);
      }

      .topbar {
        border-bottom-color: var(--sw-border);
        background: rgba(9, 13, 22, 0.94);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.26);
      }

      .brand { color: var(--sw-gold-bright); }

      .brand-mark {
        border: 1px solid rgba(244, 211, 138, 0.38);
        background: linear-gradient(145deg, rgba(216, 173, 95, 0.28), rgba(78, 167, 216, 0.18));
        color: var(--sw-gold-bright);
      }

      .nav a:hover,
      .button:hover {
        background: rgba(216, 173, 95, 0.12);
        color: #fff7df;
      }

      .button.primary {
        border-color: rgba(244, 211, 138, 0.42);
        background: linear-gradient(180deg, #b98535, #7e5523);
        box-shadow: 0 12px 28px rgba(126, 85, 35, 0.28);
      }

      .button.outline { border-color: var(--sw-border); color: #f3d99e; }
      .button.danger { border-color: rgba(200, 95, 95, 0.62); background: rgba(94, 30, 30, 0.34); color: #ffd1d1; }
      h1, h2, h3, .monster-name { color: #fff3cf; }
      .muted { color: #a8b6c8; }

      .card,
      .monster,
      .info {
        border-color: var(--sw-border-soft);
        background: linear-gradient(180deg, var(--sw-panel-strong), var(--sw-panel));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 45px rgba(0, 0, 0, 0.22);
      }

      .badge {
        border-color: rgba(102, 125, 154, 0.44);
        background: rgba(7, 10, 18, 0.28);
      }

      .badge.good { border-color: rgba(216, 173, 95, 0.56); color: var(--sw-gold-bright); }
      .badge.medium { border-color: rgba(78, 167, 216, 0.55); color: #9ed8f1; }

      .portrait {
        background: linear-gradient(145deg, #202b3f, #111827);
        box-shadow: inset 0 0 0 1px rgba(244, 211, 138, 0.12), 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      .info.focus { border-color: rgba(216, 173, 95, 0.36); }
      .info.tips { border-color: rgba(78, 167, 216, 0.32); }
      .info.risks { border-color: rgba(200, 95, 95, 0.36); }
      .info.requirements { border-color: rgba(244, 211, 138, 0.38); }

      main {
        padding-top: 28px;
      }

      .card {
        position: relative;
        overflow: hidden;
        padding: 24px;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 18% 0%, rgba(216, 173, 95, 0.18), transparent 34%),
          radial-gradient(circle at 88% 8%, rgba(78, 167, 216, 0.15), transparent 30%);
      }

      .card > * {
        position: relative;
        z-index: 1;
      }

      .head {
        align-items: center;
        border-bottom: 1px solid rgba(187, 147, 72, 0.18);
        padding-bottom: 18px;
      }

      h1 {
        font-size: 34px;
      }

      h2 {
        color: #f4d38a;
      }

      .monster {
        padding: 18px 14px;
      }

      .portrait {
        width: 112px;
        height: 112px;
        border: 1px solid rgba(244, 211, 138, 0.18);
        border-radius: 999px;
      }

      .info-grid {
        gap: 16px;
      }

      .info {
        padding: 16px;
      }
    </style>
    <link rel="stylesheet" href="/theme.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/dashboard">
          <span class="brand-mark">S</span>
          <span>Siege Helper</span>
        </a>
        <nav class="nav">
          <a href="/dashboard">Home</a>
          <a href="/defenses/new">Nova Defesa</a>
          <a href="/attacks/new">Novo Ataque</a>
          <a href="/?logout=1">Sair</a>
          <button class="theme-toggle" id="themeToggle" type="button">Light</button>
        </nav>
      </div>
    </header>

    <main>
      <a class="button outline" href="javascript:history.back()">Voltar</a>
      <section id="content" class="loading">Carregando ataque...</section>
    </main>

    <script>
      function setupThemeToggle() {
        const key = "siege-helper-theme";
        const button = document.getElementById("themeToggle");
        const applyTheme = (theme) => {
          document.documentElement.dataset.theme = theme;
          if (button) button.textContent = theme === "light" ? "Dark" : "Light";
        };
        applyTheme(localStorage.getItem(key) || "dark");
        if (button) {
          button.addEventListener("click", () => {
            const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
            localStorage.setItem(key, nextTheme);
            applyTheme(nextTheme);
          });
        }
      }
      setupThemeToggle();

      const IMG_BASE = "https://swarfarm.com/static/herders/images/monsters/";
      const content = document.getElementById("content");
      const id = location.pathname.match(/\/attacks\/(\d+)/)?.[1];
      const portraitCache = new Map();

      const attackTypeLabels = {
        safe: "Safe",
        bruiser: "Bruiser",
        cleave: "Cleave",
        tank: "Tank",
        counter: "Counter",
        speed_contest: "Speed Contest",
      };
      const successLabels = { low: "Baixa", medium: "Média", high: "Alta" };
      const recommendationLabels = {
        recommended: "Recomendado",
        situational: "Situacional",
        not_recommended: "Não Recomendado",
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function label(map, value) {
        return map[value] || value || "";
      }

      async function lookupPortrait(name) {
        const key = name.toLowerCase();
        if (portraitCache.has(key)) return portraitCache.get(key);
        portraitCache.set(key, null);
        try {
          const query = new URLSearchParams({ name, page_size: "10" });
          const response = await fetch(`/api/monster-search?${query}`);
          if (!response.ok) return null;
          const data = await response.json();
          const results = data.results || [];
          const match = results.find((item) => item.name?.toLowerCase() === key) || results[0];
          const portrait = match?.image_filename ? `${IMG_BASE}${match.image_filename}` : null;
          portraitCache.set(key, portrait);
          return portrait;
        } catch {
          return null;
        }
      }

      function parseRequirements(raw) {
        if (!raw) return { notes: "", monsters: [] };
        try {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed.monsters)) {
            return { notes: parsed.notes || "", monsters: parsed.monsters };
          }
        } catch {}
        return { notes: raw, monsters: [] };
      }

      function formatRunes(runes) {
        return Array.isArray(runes) ? runes.join(" + ") : (runes || "");
      }

      function formatStats(stats) {
        if (Array.isArray(stats)) {
          return stats.map((item) => `${item.label || item.key}: ${item.value}`).join(" / ");
        }
        return stats || "";
      }

      function formatTick(tick) {
        if (!tick || typeof tick !== "object") return "";
        const parts = [];
        if (tick.baseSpeed) parts.push(`Base SPD ${tick.baseSpeed}`);
        if (tick.leader && tick.leader !== "0") parts.push(`Leader ${tick.leader}%`);
        if (tick.targetTick) parts.push(`Tick alvo ${tick.targetTick}`);
        const minSpd = tick.minSpd || tick.requiredSpd;
        if (minSpd) parts.push(`SPD minimo +${minSpd}`);
        return parts.join(" / ");
      }

      async function monsterMarkup(name, build) {
        const imageUrl = await lookupPortrait(name);
        const runesText = formatRunes(build?.runes);
        const statsText = formatStats(build?.stats);
        const tickText = formatTick(build?.tick);
        return `
          <div class="monster">
            <div class="portrait">
              ${imageUrl
                ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.remove()" />`
                : escapeHtml(name.slice(0, 1))}
            </div>
            <div class="monster-name">${escapeHtml(name)}</div>
            ${(runesText || statsText || tickText) ? `
              <div class="monster-build">
                ${runesText ? `<div><strong>Runas:</strong> ${escapeHtml(runesText)}</div>` : ""}
                ${statsText ? `<div><strong>Stats:</strong> ${escapeHtml(statsText)}</div>` : ""}
                ${tickText ? `<div><strong>Tick:</strong> ${escapeHtml(tickText)}</div>` : ""}
              </div>
            ` : ""}
          </div>
        `;
      }

      function infoBlock(title, text, className) {
        if (!text) return "";
        return `
          <div class="info ${className}">
            <h3>${escapeHtml(title)}</h3>
            <div class="muted preline">${escapeHtml(text)}</div>
          </div>
        `;
      }

      async function render() {
        if (!id) {
          content.className = "empty";
          content.textContent = "Ataque não encontrado.";
          return;
        }

        try {
          const response = await fetch(`/api/attack-detail?id=${encodeURIComponent(id)}`);
          const attack = await response.json();
          if (!response.ok) throw new Error(attack.detail || "Erro ao carregar ataque");
          const requirements = parseRequirements(attack.requirements);

          const monsterTiles = await Promise.all([
            monsterMarkup(attack.monster1, requirements.monsters.find((item) => item.slot === 1 || item.monster === attack.monster1)),
            monsterMarkup(attack.monster2, requirements.monsters.find((item) => item.slot === 2 || item.monster === attack.monster2)),
            monsterMarkup(attack.monster3, requirements.monsters.find((item) => item.slot === 3 || item.monster === attack.monster3)),
          ]);

          content.className = "";
          content.innerHTML = `
            <section class="card">
              <div class="head">
                <div>
                  <h1>${escapeHtml(attack.name)}</h1>
                  <div class="badges" style="margin-top: 12px;">
                    <span class="badge good">${escapeHtml(label(recommendationLabels, attack.recommendation))}</span>
                    <span class="badge">${escapeHtml(label(attackTypeLabels, attack.attack_type))}</span>
                    <span class="badge medium">Taxa: ${escapeHtml(label(successLabels, attack.success_rate))}</span>
                    ${attack.season ? `<span class="badge">${escapeHtml(attack.season)}</span>` : ""}
                  </div>
                </div>
                <div class="actions">
                  <a class="button outline" href="/defenses/${attack.defense_id}">Ver Defesa</a>
                  <a class="button primary" href="/attacks/${attack.id}/edit">Editar</a>
                  <button class="button danger" id="deleteAttackButton" type="button">Excluir</button>
                </div>
              </div>

              <h2>Composição do Ataque</h2>
              <div class="monsters">${monsterTiles.join("")}</div>

              <h2>Informações</h2>
              <div class="info-grid">
                ${infoBlock("Ordem de Foco", attack.focus_order, "focus")}
                ${infoBlock("Dicas", attack.tips, "tips")}
                ${infoBlock("Riscos", attack.risks, "risks")}
                ${infoBlock("Requisitos Mínimos", requirements.notes, "requirements")}
                ${infoBlock("Observações", attack.observations, "")}
              </div>
            </section>
          `;

          document.getElementById("deleteAttackButton").addEventListener("click", async () => {
            const confirmed = confirm("Excluir este ataque? Esta ação não pode ser desfeita.");
            if (!confirmed) return;
            try {
              const deleteResponse = await fetch(`/api/attacks/${attack.id}`, { method: "DELETE" });
              const deleteData = await deleteResponse.json();
              if (!deleteResponse.ok) throw new Error(deleteData.detail || "Erro ao excluir ataque");
              location.href = `/defenses/${attack.defense_id}`;
            } catch (error) {
              content.insertAdjacentHTML(
                "afterbegin",
                `<div class="info risks" style="margin-bottom: 14px;">${escapeHtml(error.message || "Erro ao excluir ataque.")}</div>`
              );
            }
          });
        } catch (error) {
          content.className = "empty";
          content.textContent = error.message || "Erro ao carregar ataque.";
        }
      }

      render();
    </script>
  </body>
</html>
