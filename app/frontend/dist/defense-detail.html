<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Helper</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #020617; }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(51, 65, 85, 0.7);
        background: rgba(15, 23, 42, 0.96);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        display: flex;
        height: 64px;
        max-width: 1024px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 20px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 7px;
        background: rgba(99, 102, 241, 0.22);
        color: #a5b4fc;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav a,
      .button {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0 14px;
        background: transparent;
        color: #cbd5e1;
        cursor: pointer;
      }

      .nav a:hover,
      .button:hover {
        background: rgba(30, 41, 59, 0.8);
        color: #fff;
      }

      .button.primary {
        background: #4f46e5;
        color: #fff;
      }

      .button.outline {
        border-color: #475569;
      }

      .button.danger {
        border-color: rgba(248, 113, 113, 0.55);
        background: rgba(127, 29, 29, 0.24);
        color: #fecaca;
      }

      main {
        max-width: 1024px;
        margin: 0 auto;
        padding: 24px 16px 36px;
      }

      .card {
        border: 1px solid rgba(51, 65, 85, 0.7);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.55);
        padding: 20px;
      }

      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
      }

      h2 {
        margin: 28px 0 12px;
        font-size: 20px;
      }

      .muted { color: #94a3b8; }
      .small { font-size: 14px; }

      .badges,
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0 9px;
        color: #cbd5e1;
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.tower {
        border-color: rgba(99, 102, 241, 0.55);
        color: #c7d2fe;
      }

      .badge.season {
        border-color: rgba(6, 182, 212, 0.55);
        color: #67e8f9;
      }

      .badge.medium {
        border-color: rgba(234, 179, 8, 0.35);
        background: rgba(234, 179, 8, 0.1);
        color: #facc15;
      }

      .monsters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .monster {
        min-width: 0;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.64);
        padding: 14px;
        text-align: center;
      }

      .portrait {
        display: grid;
        width: 96px;
        height: 96px;
        place-items: center;
        overflow: hidden;
        margin: 0 auto 10px;
        border-radius: 10px;
        background: #334155;
        color: #94a3b8;
        font-size: 28px;
        font-weight: 700;
      }

      .portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .monster-name {
        overflow-wrap: anywhere;
        color: #f8fafc;
        font-weight: 700;
      }

      .section {
        margin-top: 20px;
      }

      .empty,
      .loading {
        display: grid;
        min-height: 220px;
        place-items: center;
        color: #94a3b8;
        text-align: center;
      }

      .attack-list {
        display: grid;
        gap: 12px;
      }

      .attack {
        display: grid;
        gap: 12px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.58);
        padding: 16px;
        transition: border-color 0.16s ease, background 0.16s ease;
      }

      .attack:hover {
        border-color: rgba(99, 102, 241, 0.75);
        background: rgba(30, 41, 59, 0.82);
      }

      .attack-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .attack-title {
        margin: 0;
        color: #f8fafc;
        font-size: 17px;
        line-height: 1.25;
      }

      .attack-monsters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .attack-monster {
        min-width: 0;
        border: 1px solid #334155;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.38);
        padding: 8px;
        text-align: center;
      }

      .attack-portrait {
        display: grid;
        width: 56px;
        height: 56px;
        place-items: center;
        overflow: hidden;
        margin: 0 auto 7px;
        border-radius: 8px;
        background: #334155;
        color: #94a3b8;
        font-weight: 800;
      }

      .attack-portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .attack-monster-name {
        overflow: hidden;
        color: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .attack-build {
        margin-top: 6px;
        color: #94a3b8;
        font-size: 11px;
        line-height: 1.35;
      }

      .attack-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      @media (max-width: 680px) {
        .nav { display: none; }
        .head { flex-direction: column; }
        .monsters { grid-template-columns: 1fr; }
        .button { width: 100%; }
      }

      :root {
        --sw-panel: rgba(24, 31, 45, 0.78);
        --sw-panel-strong: rgba(33, 42, 60, 0.92);
        --sw-border: rgba(187, 147, 72, 0.32);
        --sw-border-soft: rgba(102, 125, 154, 0.34);
        --sw-gold: #d8ad5f;
        --sw-gold-bright: #f4d38a;
      }

      body {
        background:
          linear-gradient(135deg, rgba(8, 11, 18, 0.98), rgba(13, 21, 33, 0.98) 46%, rgba(31, 26, 20, 0.98)),
          repeating-linear-gradient(45deg, rgba(244, 211, 138, 0.035) 0 1px, transparent 1px 18px);
      }

      .topbar {
        border-bottom-color: var(--sw-border);
        background: rgba(9, 13, 22, 0.94);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.26);
      }

      .brand { color: var(--sw-gold-bright); }

      .brand-mark {
        border: 1px solid rgba(244, 211, 138, 0.38);
        background: linear-gradient(145deg, rgba(216, 173, 95, 0.28), rgba(78, 167, 216, 0.18));
        color: var(--sw-gold-bright);
      }

      .nav a:hover,
      .button:hover {
        background: rgba(216, 173, 95, 0.12);
        color: #fff7df;
      }

      .button.primary {
        border-color: rgba(244, 211, 138, 0.42);
        background: linear-gradient(180deg, #b98535, #7e5523);
        box-shadow: 0 12px 28px rgba(126, 85, 35, 0.28);
      }

      .button.outline { border-color: var(--sw-border); color: #f3d99e; }
      .button.danger { border-color: rgba(200, 95, 95, 0.62); background: rgba(94, 30, 30, 0.34); color: #ffd1d1; }
      h1, h2, .attack-title, .monster-name { color: #fff3cf; }
      .muted { color: #a8b6c8; }

      .card,
      .monster,
      .attack,
      .attack-monster {
        border-color: var(--sw-border-soft);
        background: linear-gradient(180deg, var(--sw-panel-strong), var(--sw-panel));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 18px 45px rgba(0, 0, 0, 0.22);
      }

      .attack:hover {
        border-color: rgba(244, 211, 138, 0.66);
        background: linear-gradient(180deg, rgba(39, 49, 68, 0.96), rgba(27, 35, 51, 0.9));
      }

      .badge {
        border-color: rgba(102, 125, 154, 0.44);
        background: rgba(7, 10, 18, 0.28);
      }

      .badge.tower { border-color: rgba(216, 173, 95, 0.56); color: var(--sw-gold-bright); }
      .badge.season { border-color: rgba(78, 167, 216, 0.55); color: #9ed8f1; }

      .portrait,
      .attack-portrait {
        background: linear-gradient(145deg, #202b3f, #111827);
        box-shadow: inset 0 0 0 1px rgba(244, 211, 138, 0.12), 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      main {
        padding-top: 28px;
      }

      .card {
        position: relative;
        overflow: hidden;
        padding: 24px;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 18% 0%, rgba(216, 173, 95, 0.18), transparent 34%),
          radial-gradient(circle at 88% 8%, rgba(78, 167, 216, 0.15), transparent 30%);
      }

      .card > * {
        position: relative;
        z-index: 1;
      }

      .head {
        align-items: center;
        border-bottom: 1px solid rgba(187, 147, 72, 0.18);
        padding-bottom: 18px;
      }

      h1 {
        font-size: 34px;
      }

      h2 {
        color: #f4d38a;
      }

      .monsters {
        gap: 16px;
      }

      .monster {
        padding: 18px 14px;
      }

      .portrait {
        width: 112px;
        height: 112px;
        border: 1px solid rgba(244, 211, 138, 0.18);
        border-radius: 999px;
      }

      .attack-list {
        gap: 14px;
      }

      .attack {
        position: relative;
        overflow: hidden;
        padding: 18px;
      }

      .attack::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(90deg, rgba(216, 173, 95, 0.08), transparent 44%, rgba(78, 167, 216, 0.07));
      }

      .attack > * {
        position: relative;
        z-index: 1;
      }

      .attack-monsters {
        gap: 10px;
      }

      .attack-monster {
        padding: 10px;
      }

      .attack-portrait {
        border-radius: 999px;
      }
    </style>
    <link rel="stylesheet" href="/theme.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/dashboard">
          <span class="brand-mark">S</span>
          <span>Siege Helper</span>
        </a>
        <nav class="nav">
          <a href="/dashboard">Home</a>
          <a href="/defenses/new">Nova Defesa</a>
          <a href="/attacks/new">Novo Ataque</a>
          <a href="/?logout=1">Sair</a>
          <button class="theme-toggle" id="themeToggle" type="button">Light</button>
        </nav>
      </div>
    </header>

    <main>
      <a class="button outline" href="/dashboard">Voltar</a>
      <section id="content" class="loading">Carregando defesa...</section>
    </main>

    <script>
      function setupThemeToggle() {
        const key = "siege-helper-theme";
        const button = document.getElementById("themeToggle");
        const applyTheme = (theme) => {
          document.documentElement.dataset.theme = theme;
          if (button) button.textContent = theme === "light" ? "Dark" : "Light";
        };
        applyTheme(localStorage.getItem(key) || "dark");
        if (button) {
          button.addEventListener("click", () => {
            const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
            localStorage.setItem(key, nextTheme);
            applyTheme(nextTheme);
          });
        }
      }
      setupThemeToggle();

      const API_BASE = "http://127.0.0.1:8000";
      const IMG_BASE = "https://swarfarm.com/static/herders/images/monsters/";
      const content = document.getElementById("content");
      const id = location.pathname.match(/\/defenses\/(\d+)/)?.[1];
      const portraitCache = new Map();

      const towerLabels = { "4star": "4★", "5star": "5★" };
      const difficultyLabels = { easy: "Fácil", medium: "Médio", hard: "Difícil" };
      const typeLabels = {
        bruiser: "Bruiser",
        cleave: "Cleave",
        sustain: "Sustain",
        control: "Controle",
        speed_contest: "Speed Contest",
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function label(map, value) {
        return map[value] || value || "";
      }

      async function lookupPortrait(name) {
        const key = name.toLowerCase();
        if (portraitCache.has(key)) return portraitCache.get(key);
        portraitCache.set(key, null);
        try {
          const query = new URLSearchParams({ name, page_size: "10" });
          const response = await fetch(`/api/monster-search?${query}`);
          if (!response.ok) return null;
          const data = await response.json();
          const results = data.results || [];
          const match = results.find((item) => item.name?.toLowerCase() === key) || results[0];
          const portrait = match?.image_filename ? `${IMG_BASE}${match.image_filename}` : null;
          portraitCache.set(key, portrait);
          return portrait;
        } catch {
          return null;
        }
      }

      async function monsterMarkup(name) {
        const imageUrl = await lookupPortrait(name);
        const image = imageUrl
          ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.remove()" />`
          : escapeHtml(name.slice(0, 1));
        return `
          <div class="monster">
            <div class="portrait">${image}</div>
            <div class="monster-name">${escapeHtml(name)}</div>
          </div>
        `;
      }

      function parseRequirements(raw) {
        if (!raw) return { notes: "", monsters: [] };
        try {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed.monsters)) {
            return { notes: parsed.notes || "", monsters: parsed.monsters };
          }
        } catch {}
        return { notes: raw, monsters: [] };
      }

      function formatRunes(runes) {
        return Array.isArray(runes) ? runes.join(" + ") : (runes || "");
      }

      function formatStats(stats) {
        if (Array.isArray(stats)) {
          return stats.map((item) => `${item.label || item.key}: ${item.value}`).join(" / ");
        }
        return stats || "";
      }

      async function attackMonsterMarkup(name, build) {
        const imageUrl = await lookupPortrait(name);
        const runesText = formatRunes(build?.runes);
        const statsText = formatStats(build?.stats);
        return `
          <div class="attack-monster">
            <div class="attack-portrait">
              ${imageUrl
                ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.remove()" />`
                : escapeHtml(name.slice(0, 1))}
            </div>
            <div class="attack-monster-name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
            ${(runesText || statsText) ? `
              <div class="attack-build">
                ${runesText ? `<div>${escapeHtml(runesText)}</div>` : ""}
                ${statsText ? `<div>${escapeHtml(statsText)}</div>` : ""}
              </div>
            ` : ""}
          </div>
        `;
      }

      async function attackMarkup(attack) {
        const requirements = parseRequirements(attack.requirements);
        const monsterTiles = await Promise.all([
          attackMonsterMarkup(attack.monster1, requirements.monsters.find((item) => item.slot === 1 || item.monster === attack.monster1)),
          attackMonsterMarkup(attack.monster2, requirements.monsters.find((item) => item.slot === 2 || item.monster === attack.monster2)),
          attackMonsterMarkup(attack.monster3, requirements.monsters.find((item) => item.slot === 3 || item.monster === attack.monster3)),
        ]);
        return `
          <a class="attack" href="/attacks/${attack.id}">
            <div class="attack-head">
              <h3 class="attack-title">${escapeHtml(attack.name)}</h3>
              <span class="badge">${escapeHtml(attack.attack_type || "Ataque")}</span>
            </div>
            <div class="attack-monsters">${monsterTiles.join("")}</div>
            <div class="attack-tags">
              <span class="badge">${escapeHtml(attack.recommendation || "recommended")}</span>
              <span class="badge">${escapeHtml(attack.success_rate || "medium")}</span>
            </div>
          </a>
        `;
      }

      async function render() {
        if (!id) {
          content.className = "empty";
          content.textContent = "Defesa não encontrada.";
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/api/v1/search/defense/${id}`);
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "Erro ao carregar defesa");

          const defense = data.defense;
          const attacks = data.attacks || [];
          const monsterTiles = await Promise.all([
            monsterMarkup(defense.monster1),
            monsterMarkup(defense.monster2),
            monsterMarkup(defense.monster3),
          ]);
          const attackCards = await Promise.all(attacks.map(attackMarkup));

          content.className = "";
          content.innerHTML = `
            <section class="card">
              <div class="head">
                <div>
                  <h1>${escapeHtml(defense.name)}</h1>
                  <div class="badges" style="margin-top: 12px;">
                    <span class="badge tower">${escapeHtml(label(towerLabels, defense.tower))}</span>
                    <span class="badge">${escapeHtml(label(typeLabels, defense.defense_type))}</span>
                    <span class="badge ${escapeHtml(defense.difficulty)}">${escapeHtml(label(difficultyLabels, defense.difficulty))}</span>
                    ${defense.season ? `<span class="badge season">${escapeHtml(defense.season)}</span>` : ""}
                  </div>
                </div>
                <div class="actions">
                  <a class="button outline" href="/defenses/${defense.id}/edit">Editar</a>
                  <a class="button primary" href="/attacks/new?defense_id=${defense.id}">Novo Ataque</a>
                  <button class="button danger" id="deleteDefenseButton" type="button">Excluir</button>
                </div>
              </div>

              <div class="section">
                <h2>Composição</h2>
                <div class="monsters">${monsterTiles.join("")}</div>
              </div>

              ${defense.observations ? `
                <div class="section">
                  <h2>Observações</h2>
                  <p class="muted">${escapeHtml(defense.observations)}</p>
                </div>
              ` : ""}
            </section>

            <section>
              <h2>Ataques (${attacks.length})</h2>
              ${attacks.length
                ? `<div class="attack-list">${attackCards.join("")}</div>`
                : `<div class="empty">Nenhum ataque cadastrado para esta defesa.</div>`}
            </section>
          `;

          document.getElementById("deleteDefenseButton").addEventListener("click", async () => {
            const suffix = attacks.length
              ? `\n\nEsta defesa possui ${attacks.length} ataque(s). Eles também serão excluídos.`
              : "";
            const confirmed = confirm(`Excluir esta defesa? Esta ação não pode ser desfeita.${suffix}`);
            if (!confirmed) return;
            try {
              const deleteResponse = await fetch(`/api/defenses/${defense.id}`, { method: "DELETE" });
              const deleteData = await deleteResponse.json();
              if (!deleteResponse.ok) throw new Error(deleteData.detail || "Erro ao excluir defesa");
              location.href = "/dashboard";
            } catch (error) {
              content.insertAdjacentHTML(
                "afterbegin",
                `<div class="empty" style="min-height: auto; margin-bottom: 14px; color: #f87171;">${escapeHtml(error.message || "Erro ao excluir defesa.")}</div>`
              );
            }
          });
        } catch (error) {
          content.className = "empty";
          content.textContent = error.message || "Erro ao carregar defesa.";
        }
      }

      render();
    </script>
  </body>
</html>
